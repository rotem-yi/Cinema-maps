  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .legend-bubble { border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .leaflet-popup-content-wrapper { background: #16213e; color: #eee; border: 1px solid #0f3460; border-radius: 8px; }
  .leaflet-popup-tip { background: #16213e; }
  .popup-title { font-size: 1rem; font-weight: bold; color: #e8c468; margin-bottom: 4px; }

// Screen-count → color (1 screen = light blue, 6 screens = deep indigo)
const SCREEN_COLORS = {
  1: '#a8d8ea',
  2: '#67b3d1',
  3: '#2e8eb8',
  4: '#1a6a9e',
  5: '#0d4a84',
  6: '#06306b'
};

function getColor(screens) {
  return SCREEN_COLORS[screens] || '#a8d8ea';
}

function getRadius(seats) {
  if (!seats || seats === 0) return 9;
  // scale from 9 to 32 for 0-1500 seats
  return 9 + (seats / 1500) * 23;
}

// Group data by year
const byYear = {};
CINEMA_DATA.forEach(d => {
  if (!byYear[d.year]) byYear[d.year] = [];
  byYear[d.year].push(d);
});

// Init map centred on Tel Aviv area
const map = L.map('map', { zoomControl: true }).setView([32.07, 34.78], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>מספר מסכים</h4>
    ${Object.entries(SCREEN_COLORS).map(([s, c]) =>
      `<div class="legend-item"><span class="legend-bubble" style="width:14px;height:14px;background:${c};opacity:0.85;"></span><span>${s} ${s > 1 ? 'מסכים' : 'מסך'}</span></div>`
    ).join('')}
    <h4 style="margin-top:10px;">גודל בועה</h4>
    <div class="legend-item"><span class="legend-bubble" style="width:9px;height:9px;background:#a8d8ea;opacity:0.8;"></span><span>ללא נתון מושבים</span></div>
    <div class="legend-item"><span class="legend-bubble" style="width:20px;height:20px;background:#a8d8ea;opacity:0.8;"></span><span>~600 מושבים</span></div>
    <div class="legend-item"><span class="legend-bubble" style="width:32px;height:32px;background:#a8d8ea;opacity:0.8;"></span><span>1500 מושבים</span></div>
  `;
  return div;
};
legend.addTo(map);

let circles = [];

function updateYear(year) {
  circles.forEach(c => map.removeLayer(c));
  circles = [];

  const cinemas = byYear[year] || [];
  document.getElementById('year-display').textContent = year;
  document.getElementById('cinema-count').textContent =
    cinemas.length > 0
      ? `${cinemas.length} קולנוע${cinemas.length === 1 ? '' : 'ות'} פעיל${cinemas.length === 1 ? '' : 'ים'}`
      : 'אין נתונים לשנה זו';

  cinemas.forEach(c => {
    const radius = getRadius(c.seats);
    const color = getColor(c.screens);
    const circle = L.circleMarker([c.lat, c.lng], {
      radius: radius,
      fillColor: color,
      color: 'rgba(255,255,255,0.5)',
      weight: 1,
      fillOpacity: 0.82
    });
    circle.bindPopup(`
      <div class="popup-title">${c.name}</div>
      <div class="popup-info">
        מסכים: <b>${c.screens}</b><br>
        מושבים: <b>${c.seats > 0 ? c.seats : 'לא ידוע'}</b><br>
        שנה: <b>${year}</b>
      </div>
    `);
    circle.addTo(map);
    circles.push(circle);
  });
}

const slider = document.getElementById('year-slider');
slider.addEventListener('input', () => updateYear(parseInt(slider.value)));

// Play/pause
let playing = false;
let playInterval = null;
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸' : '▶';
  if (playing) {
    playInterval = setInterval(() => {
      let y = parseInt(slider.value) + 1;
      if (y > 2016) { y = 1914; }
      slider.value = y;
      updateYear(y);
    }, 400);
  } else {
    clearInterval(playInterval);
  }
});

// Initial render
updateYear(1914);
</script>
